# ============================================
# SPIT Leave Management System — Full Stack
# ============================================

services:

  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: leave_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leave_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Express / Prisma API
  # ──────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: leave_mgmt_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://postgres:password@db:5432/leave_management?schema=public
      JWT_SECRET: change_this_to_a_long_random_secret_before_deploying
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 10
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: leave_mgmt_frontend
    restart: unless-stopped
    depends_on:
      - api

  # ──────────────────────────────────────────
  # Nginx Reverse Proxy (FIXED)
  # ──────────────────────────────────────────
  proxy:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: leave_mgmt_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  uploads_data:
