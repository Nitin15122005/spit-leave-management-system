# ============================================
# Reverse Proxy — nginx config
# Routes:
#   /api/*      → api container (Express on :5001)
#   /uploads/*  → api container (static file uploads)
#   /*          → frontend container (React on :80)
# ============================================

upstream api {
    server api:5001;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Allow up to 10 MB request bodies (for file uploads)
    client_max_body_size 10m;

    # ──────────────────────────────────────────
    # Backend API
    # ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ──────────────────────────────────────────
    # Uploaded files served by the API container
    # ──────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ──────────────────────────────────────────
    # React SPA — everything else
    # ──────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
